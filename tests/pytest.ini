[pytest]
markers =
    live: requires live GCP credentials and network access
    yentlbench: requires YentlBench installed and data accessible
    phoenix: requires Arize Phoenix endpoint to be reachable
    mcp: requires Phoenix MCP server to be running locally

# Show warnings in test output
filterwarnings =
    default::UserWarning
    ignore::DeprecationWarning:pkg_resources
    ignore::DeprecationWarning:google

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async test mode for IsolatedAsyncioTestCase
asyncio_mode = auto
